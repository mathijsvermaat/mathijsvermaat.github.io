<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f1822" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WisselApp" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>WisselApp</title>
</head>
<body>
  <header id="topbar">
    <button class="iconbtn" id="btn-back" aria-label="Terug" hidden>‹</button>
    <h1 id="title">WisselApp</h1>
    <button class="iconbtn" id="btn-menu" aria-label="Menu">☰</button>
  </header>

  <main id="view"></main>

  <nav id="tabbar">
    <button data-route="matches" class="tab">Wedstrijden</button>
    <button data-route="roster" class="tab">Spelers</button>
    <button data-route="stats" class="tab">Speeltijd</button>
    <button data-route="settings" class="tab">Instellingen</button>
  </nav>

  <div id="alert-overlay" hidden>
    <div class="alert-card">
      <h2 id="alert-title">Wisselen!</h2>
      <div id="alert-body"></div>
      <button id="alert-dismiss" class="primary">OK</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
